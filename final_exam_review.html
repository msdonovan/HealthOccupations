<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health Occupations Final Exam Review 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* ==========================================================
     LIGHT THEME — soft cream paper + medical-teal accents
     Easy on the eyes for long study sessions
     ========================================================== */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf9f0;
    --bg-soft: #f5ecd9;
    --bg-card: #ffffff;
    --bg-deep: #f0e6cf;
    --ink: #2a2520;
    --ink-soft: #6b5f51;
    --ink-muted: #998b78;
    --accent: #0d8a72;
    --accent-soft: #5cb39b;
    --accent-deep: #096452;
    --gold: #c89b3c;
    --warm: #e8703a;
    --green: #2e7d3a;
    --green-bg: #d8eedc;
    --red: #c23636;
    --red-bg: #f5d8d8;
    --blue: #2563a8;
    --purple: #7c3aed;
    --teal: #0d8a72;
    --rose: #d04372;
    --amber: #c89b3c;
    --border: rgba(42, 37, 32, 0.12);
    --border-strong: rgba(42, 37, 32, 0.28);
    --paper-shadow: rgba(120, 100, 70, 0.18);
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(at 15% 12%, rgba(13, 138, 114, 0.06) 0%, transparent 45%),
      radial-gradient(at 85% 88%, rgba(232, 112, 58, 0.05) 0%, transparent 45%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.05'/></svg>");
    pointer-events: none;
    z-index: 0;
  }

  body {
    min-height: 100vh;
    padding: 32px 20px;
    position: relative;
  }

  .wrapper {
    max-width: 820px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 32px;
    text-align: center;
  }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(1.8rem, 4.8vw, 2.6rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--ink-soft);
    margin-top: 10px;
  }

  /* MODE PICKER (HOME) */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .mode-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: left;
    color: inherit;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .mode-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 4px;
    background: var(--card-accent, var(--accent));
    opacity: 0.85;
  }

  .mode-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  }

  .mode-icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }

  .mode-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.2rem;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .mode-desc {
    font-size: 0.83rem;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  .mode-meta {
    margin-top: 10px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-muted);
    font-weight: 600;
  }

  /* TOP BAR (during a mode) */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .back-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink-soft);
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .back-btn:hover { background: var(--bg-card); color: var(--ink); }

  .mode-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ink);
  }

  .progress-readout {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .progress-bar {
    height: 4px;
    background: var(--bg-card);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.4s ease;
    border-radius: 999px;
  }

  /* SHARED PANEL */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 26px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  .panel-tag {
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* FLASHCARDS */
  .flash-stage { perspective: 1600px; margin-bottom: 18px; min-height: 300px; }

  .flash-card {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }

  .flash-card.flipped { transform: rotateY(180deg); }

  .flash-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .flash-back { transform: rotateY(180deg); background: linear-gradient(135deg, #ffffff 0%, #fff8e8 100%); }

  .flash-term {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(1.5rem, 4.5vw, 2.3rem);
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .flash-term.wordpart {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gold);
    font-weight: 400;
  }

  .flash-hint {
    font-size: 0.78rem;
    color: var(--ink-muted);
    font-style: italic;
    margin-top: 16px;
  }

  .flash-def {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.05rem, 3vw, 1.35rem);
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .flash-extra {
    font-size: 0.85rem;
    color: var(--ink-soft);
    line-height: 1.5;
    font-style: italic;
    max-width: 480px;
  }

  .flash-extra::before { content: '— '; color: var(--accent); }

  .deck-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 18px;
  }

  .deck-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--ink-soft);
    padding: 7px 14px;
    font-size: 0.78rem;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s;
    font-family: inherit;
    font-weight: 500;
  }

  .deck-btn:hover { color: var(--ink); border-color: var(--accent); }
  .deck-btn.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink);
    padding: 11px 18px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s;
  }

  .nav-btn:hover:not(:disabled) { background: var(--bg-soft); border-color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .primary-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 11px 26px;
    font-family: inherit;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(13, 138, 114, 0.3);
  }

  .primary-btn:hover:not(:disabled) { background: var(--accent-deep); transform: translateY(-1px); }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .rating { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

  .rate-btn {
    padding: 11px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 10px;
    border: 1px solid;
    transition: all 0.2s;
    background: transparent;
  }

  .rate-btn.know { border-color: var(--green); color: var(--green); }
  .rate-btn.know:hover { background: var(--green); color: var(--bg); }
  .rate-btn.review { border-color: var(--red); color: var(--red); }
  .rate-btn.review:hover { background: var(--red); color: white; }

  .utilities { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }

  /* Student name bar — shown on home screen */
  .student-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: var(--bg-card);
    border-radius: 10px;
    border: 1px solid var(--border);
    margin-bottom: 18px;
    box-shadow: 0 2px 8px var(--paper-shadow);
  }

  .student-name-display {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    color: var(--ink);
  }

  .student-name-display em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .change-name-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--ink-soft);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    transition: all 0.2s;
  }

  .change-name-btn:hover { background: var(--bg-soft); color: var(--ink); }

  /* Name prompt card — shown if no name is set yet */
  .name-prompt {
    background: var(--bg-card);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 8px 24px var(--paper-shadow);
    margin-bottom: 24px;
  }

  .name-prompt h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .name-prompt p {
    color: var(--ink-soft);
    font-size: 0.9rem;
    margin-bottom: 18px;
  }

  .name-input {
    width: 100%;
    max-width: 360px;
    background: var(--bg);
    border: 1.5px solid var(--border-strong);
    color: var(--ink);
    padding: 12px 16px;
    font-family: inherit;
    font-size: 1rem;
    border-radius: 10px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent); }

  /* School picker — two big buttons for NCHS / NNHS */
  .school-picker {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .school-btn {
    flex: 1;
    min-width: 130px;
    max-width: 180px;
    background: var(--bg);
    border: 2px solid var(--border-strong);
    color: var(--ink);
    padding: 14px 20px;
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .school-btn:hover { border-color: var(--accent); background: var(--bg-soft); }

  .school-btn.selected {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(13, 138, 114, 0.3);
  }

  /* Side-by-side first/last name inputs */
  .name-input-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .name-input-row .name-input {
    max-width: 175px;
    margin-bottom: 10px;
  }

  /* Inline error message under prompt inputs */
  .error-msg {
    display: none;
    color: var(--red);
    font-size: 0.85rem;
    margin-bottom: 14px;
    font-weight: 500;
  }

  /* Pill showing school next to name in the student bar */
  .school-pill {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 999px;
    letter-spacing: 0.1em;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* Completion badge on mode cards */
  .mode-completed {
    display: inline-block;
    background: var(--green);
    color: white;
    width: 18px;
    height: 18px;
    line-height: 18px;
    border-radius: 50%;
    font-size: 0.65rem;
    font-weight: 700;
    margin-left: 6px;
    text-align: center;
    vertical-align: middle;
  }

  /* Submit button — distinct from primary so students notice it */
  .submit-btn {
    background: var(--warm);
    color: white;
    border: none;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(232, 112, 58, 0.3);
  }

  .submit-btn:hover:not(:disabled) {
    background: #c95a26;
    transform: translateY(-1px);
  }

  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .submit-btn.submitted {
    background: var(--green);
    box-shadow: 0 4px 14px rgba(46, 125, 58, 0.3);
  }

  .submit-result {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }

  .submit-result.show { display: block; }

  .submit-result.success {
    background: var(--green-bg);
    border-left: 3px solid var(--green);
    color: var(--green);
    font-weight: 600;
  }

  .submit-result.notice {
    background: rgba(232, 112, 58, 0.13);
    border-left: 3px solid var(--warm);
    color: #b85a26;
  }

  .util-btn {
    background: transparent;
    border: none;
    color: var(--ink-muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    text-decoration: underline;
    text-decoration-color: rgba(168, 158, 140, 0.3);
    text-underline-offset: 4px;
    transition: color 0.2s;
    padding: 4px 8px;
  }

  .util-btn:hover { color: var(--accent); }

  /* QUIZ / FILL-IN-BLANK */
  .quiz-question {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    line-height: 1.45;
    margin-bottom: 22px;
    color: var(--ink);
  }

  .quiz-question .blank {
    display: inline-block;
    min-width: 120px;
    border-bottom: 2px solid var(--accent);
    color: var(--accent);
    font-style: italic;
    text-align: center;
    padding: 0 6px;
  }

  .quiz-question .blank.filled {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

  .quiz-option {
    background: var(--bg-soft);
    border: 1.5px solid var(--border);
    color: var(--ink);
    padding: 13px 16px;
    font-family: inherit;
    font-size: 0.92rem;
    cursor: pointer;
    border-radius: 10px;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .quiz-option:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--bg-card);
    transform: translateX(2px);
  }

  .quiz-option:disabled { cursor: default; }

  .quiz-option .letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--ink-muted);
    min-width: 22px;
  }

  .quiz-option.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green);
  }
  .quiz-option.correct .letter { color: var(--green); }

  .quiz-option.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red);
  }
  .quiz-option.wrong .letter { color: var(--red); }

  .explanation {
    background: var(--bg-soft);
    border-left: 3px solid var(--accent);
    padding: 13px 16px;
    border-radius: 6px;
    font-size: 0.88rem;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 16px;
    display: none;
  }

  .explanation.show { display: block; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .explanation strong { color: var(--ink); font-weight: 700; }

  /* TERM BREAKDOWN */
  .breakdown-term {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(1.7rem, 5vw, 2.3rem);
    text-align: center;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .breakdown-prompt {
    text-align: center;
    color: var(--ink-soft);
    margin-bottom: 24px;
    font-size: 0.88rem;
    font-style: italic;
  }

  .breakdown-fields {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
  }

  .field {
    background: var(--bg-soft);
    border-radius: 10px;
    padding: 14px 16px;
    border: 1px solid var(--border);
  }

  .field-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-muted);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .field-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    padding: 6px 0;
    border-bottom: 1.5px solid var(--border-strong);
    outline: none;
    transition: border-color 0.2s;
  }

  .field-input:focus { border-bottom-color: var(--accent); }
  .field-input.correct { border-bottom-color: var(--green); color: var(--green); }
  .field-input.wrong { border-bottom-color: var(--red); }

  .field-reveal {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--ink-soft);
    display: none;
  }
  .field-reveal.show { display: block; }
  .field-reveal strong { color: var(--green); font-family: 'JetBrains Mono', monospace; }

  /* BUILD THE TERM */
  .build-def {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.2rem, 3.5vw, 1.6rem);
    line-height: 1.35;
    text-align: center;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .build-prompt {
    text-align: center;
    color: var(--ink-soft);
    margin-bottom: 26px;
    font-size: 0.85rem;
    font-style: italic;
  }

  .slots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .slot {
    background: var(--bg-soft);
    border: 2px dashed var(--border-strong);
    border-radius: 10px;
    padding: 12px 16px;
    min-width: 100px;
    text-align: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .slot.filled { border-style: solid; border-color: var(--accent); background: var(--bg-card); }
  .slot.correct { border-color: var(--green); background: var(--green-bg); }

  .slot-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-muted);
    margin-bottom: 4px;
    font-weight: 600;
  }

  .slot-content {
    font-family: 'JetBrains Mono', monospace;

// Map mode IDs to display labels for the submit form

// Has the student filled in everything we need to identify them?
function studentInfoComplete() {
  return studentSchool && studentFirstName.trim() && studentLastName.trim();
}

// Track which modes a student has finished — shown as a green checkmark on the home grid
function getCompletionBadge(modeId) {
  return completedModes.has(modeId) ? `<span class="mode-completed" title="Completed">✓</span>` : '';
}

// Submit a score to the configured Google Form. Returns a status message.
function submitScoreToForm(modeId, score, total) {
  if (!FORM_CONFIG.enabled) {
    return { ok: false, message: 'Score submission isn\'t turned on yet — your teacher needs to set up the Google Form first. Take a screenshot of this screen and submit it through Canvas instead.' };
  }
  if (!studentInfoComplete()) {
    return { ok: false, message: 'Please fill in your school and full name first so your teacher knows whose score this is.' };
  }
  const percent = total > 0 ? Math.round((score / total) * 100) : 0;
  const formUrl = `https://docs.google.com/forms/d/e/${FORM_CONFIG.formId}/formResponse`;

  const formData = new FormData();
  formData.append(FORM_CONFIG.fields.school,    studentSchool);
  formData.append(FORM_CONFIG.fields.firstName, studentFirstName.trim());
  formData.append(FORM_CONFIG.fields.lastName,  studentLastName.trim());
  formData.append(FORM_CONFIG.fields.mode,      MODE_LABELS[modeId] || modeId);
  formData.append(FORM_CONFIG.fields.score,     String(score));
  formData.append(FORM_CONFIG.fields.total,     String(total));
  formData.append(FORM_CONFIG.fields.percent,   percent + '%');
  formData.append(FORM_CONFIG.fields.date,      new Date().toLocaleString());

  // Google Forms requires no-cors mode; we can't read the response, but it works
  fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData })
    .catch(err => console.error('Form submission error (non-fatal):', err));

  return { ok: true, message: 'Score sent to your teacher! ✓' };
}

}

// Called when student clicks an NCHS / NNHS button on the prompt card
function selectSchool(school) {
  studentSchool = school;

  document.querySelectorAll('.school-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.school === school);
  });
}

function saveNameFromPrompt() {
  const firstInp = document.getElementById('firstNameInput');
  const lastInp = document.getElementById('lastNameInput');
  const errMsg = document.getElementById('namePromptError');
  if (!firstInp || !lastInp) return;

  const first = firstInp.value.trim();
  const last = lastInp.value.trim();

  if (!studentSchool) {
    errMsg.textContent = 'Please choose your school (NCHS or NNHS).';
    errMsg.style.display = 'block';
    return;
  }
  if (!first) {
    errMsg.textContent = 'Please enter your first name.';
    errMsg.style.display = 'block';
    firstInp.focus();
    return;
  }
  if (!last) {
    errMsg.textContent = 'Please enter your last name.';
    errMsg.style.display = 'block';
    lastInp.focus();
    return;
  }

  studentFirstName = first;
  studentLastName = last;
  renderHome();
}

// Build the submit-score block for completion screens.
// modeId: the mode key (e.g. 'quiz'), score: number correct, total: total questions
function submitBlockHTML(modeId, score, total) {
  const id = `submit-${modeId}`;
  return `
    <div style="margin-top: 18px;">
      <button class="submit-btn" id="${id}-btn" onclick="handleSubmit('${modeId}', ${score}, ${total})">
        📤 Submit My Score to Teacher
      </button>
      <div class="submit-result" id="${id}-result"></div>
    </div>
  `;
}

// Triggered when the student clicks the submit button on any completion screen
function handleSubmit(modeId, score, total) {
  const btn = document.getElementById(`submit-${modeId}-btn`);
  const result = document.getElementById(`submit-${modeId}-result`);
  if (!btn || !result) return;

  if (!studentInfoComplete()) {
    result.className = 'submit-result show notice';
    result.innerHTML = 'Please <button class="util-btn" onclick="go(\'home\')" style="display:inline; padding:0;">go to the home screen</button> and fill in your school and name first.';
    return;
  }

  const res = submitScoreToForm(modeId, score, total);
  result.className = 'submit-result show ' + (res.ok ? 'success' : 'notice');
  result.textContent = res.message;

  if (res.ok) {
    btn.classList.add('submitted');
    btn.disabled = true;
    btn.innerHTML = '✓ Submitted';
    completedModes.add(modeId);
  }
}

function go(mode) {
  currentMode = mode;
  if (mode === 'home') {
    subtitle.textContent = 'Pick a study mode to begin';
    renderHome();
  } else if (mode === 'flash') {
    subtitle.textContent = 'Word parts: prefixes, suffixes, and combining forms';
    startFlashcards();
  } else if (mode === 'breakdown') {
    subtitle.textContent = 'Break a term into its prefix, root, and suffix';
    startBreakdown();
  } else if (mode === 'build') {
    subtitle.textContent = 'Build the term from word-part chips';
    startBuilder();
  } else if (mode === 'chart') {
    subtitle.textContent = 'Read a mock chart, translate the jargon';
    startChart();
  } else if (mode === 'fill') {
    subtitle.textContent = 'Choose the term that completes the sentence';
    startFillBlank();
  } else if (mode === 'quiz') {
    subtitle.textContent = 'Practice quiz from both source tests';
    startQuiz();
  } else if (mode === 'error') {
    subtitle.textContent = 'Spot the error in each medical sentence';
    startError();
  } else if (mode === 'case') {
    subtitle.textContent = 'Read the case, choose the most likely diagnosis';
    startCase();
  }
}

function topbarHTML(label, progressText) {
  return `
    <div class="topbar">
      <button class="back-btn" onclick="go('home')">← All modes</button>
      <span class="mode-label">${label}</span>
      <span class="progress-readout">${progressText}</span>
    </div>
  `;
}

function progressBarHTML(pct) {
  return `<div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =====================================================================
// FLASHCARDS MODE
// =====================================================================

const FLASH_DECKS = [
  { id: 'all',    label: 'All Cards' },
  { id: 'prefix', label: 'Prefixes' },
  { id: 'suffix', label: 'Suffixes' },
  { id: 'root',   label: 'Combining Forms' },
  { id: 'term',   label: 'Key Terms' }
];

function startFlashcards() { loadFlashDeck('all'); }

function loadFlashDeck(id) {
  flashState.deck = id;
  flashState.cards = id === 'all' ? [...WORD_PARTS] : WORD_PARTS.filter(c => c.type === id);
  flashState.cards.forEach((c, i) => c._id = `${c.type}-${c.part}-${i}`);
  flashState.idx = 0;
  flashState.known = new Set();
  flashState.review = new Set();
  renderFlash();
}

function renderFlash() {
  const cards = flashState.cards;
  const total = cards.length;
  const deckButtons = FLASH_DECKS.map(d =>
    `<button class="deck-btn ${d.id === flashState.deck ? 'active' : ''}" onclick="loadFlashDeck('${d.id}')">${d.label}</button>`
  ).join('');

  if (total === 0) {
    app.innerHTML = topbarHTML('Flashcards', '0 / 0') +
      `<div class="deck-picker">${deckButtons}</div>
       <div class="complete"><div class="complete-emoji">📭</div><div class="complete-title">No cards in this deck</div></div>`;
    return;
  }

  const card = cards[flashState.idx];
  const pct = ((flashState.idx + 1) / total) * 100;

  app.innerHTML = topbarHTML('Flashcards',
    `<span class="stats-pills"><span class="pill score">✓ ${flashState.known.size}</span><span class="pill review-pill">↻ ${flashState.review.size}</span></span> &nbsp; ${flashState.idx + 1} / ${total}`
  ) + `
    <div class="deck-picker">${deckButtons}</div>
    ${progressBarHTML(pct)}
    <div class="flash-stage">
      <div class="flash-card" id="flashCard" onclick="flipFlash()">
        <div class="flash-face">
          <div class="panel-tag">${labelForType(card.type)}</div>
          <div class="flash-term ${card.type === 'term' ? '' : 'wordpart'}">${escapeHtml(card.part)}</div>
          <div class="flash-hint">tap card or press <kbd>space</kbd> to flip</div>
        </div>
        <div class="flash-face flash-back">
          <div class="panel-tag">Meaning</div>
          <div class="flash-def">${escapeHtml(card.meaning)}</div>
          ${card.example ? `<div class="flash-extra">${escapeHtml(card.example)}</div>` : ''}
        </div>
      </div>
    </div>
    <div id="ratingArea"></div>
    <div class="controls">
      <button class="nav-btn" ${flashState.idx === 0 ? 'disabled' : ''} onclick="navFlash(-1)">← Previous</button>
      <button class="primary-btn" onclick="flipFlash()">Flip Card</button>
      <button class="nav-btn" onclick="navFlash(1)">Next →</button>
    </div>
    <div class="utilities">
      <button class="util-btn" onclick="shuffleFlash()">Shuffle deck</button>
      <button class="util-btn" onclick="loadFlashDeck('${flashState.deck}')">Reset progress</button>
      ${flashState.review.size > 0 ? `<button class="util-btn" onclick="reviewOnlyFlash()">Drill review pile (${flashState.review.size})</button>` : ''}
    </div>
    <div class="kbd-hint"><kbd>Space</kbd> flip · <kbd>←</kbd> <kbd>→</kbd> nav · <kbd>1</kbd> got it · <kbd>2</kbd> review</div>
  `;
}

function labelForType(t) {
  if (t === 'prefix') return 'Prefix';
  if (t === 'suffix') return 'Suffix';
  if (t === 'root') return 'Combining Form';
  if (t === 'term') return 'Key Term';
  return '';
}

function flipFlash() {
  const el = document.getElementById('flashCard');
  if (!el) return;
  el.classList.toggle('flipped');
  const ratingArea = document.getElementById('ratingArea');
  if (el.classList.contains('flipped')) {
    ratingArea.innerHTML = `
      <div class="rating">
        <button class="rate-btn review" onclick="rateFlash('review')">↻ Need to Review</button>
        <button class="rate-btn know" onclick="rateFlash('know')">✓ Got It</button>
      </div>
    `;
  } else {
    ratingArea.innerHTML = '';
  }
}

function rateFlash(verdict) {
  const card = flashState.cards[flashState.idx];
  if (verdict === 'know') {
    flashState.known.add(card._id);
    flashState.review.delete(card._id);
  } else {
    flashState.review.add(card._id);
    flashState.known.delete(card._id);
  }
  if (flashState.idx < flashState.cards.length - 1) navFlash(1);
  else showFlashComplete();
}

function navFlash(delta) {
  const newIdx = flashState.idx + delta;
  if (newIdx < 0) return;
  if (newIdx >= flashState.cards.length) { showFlashComplete(); return; }
  flashState.idx = newIdx;
  renderFlash();
}

function shuffleFlash() {
  flashState.cards = shuffle(flashState.cards);
  flashState.idx = 0;
  renderFlash();
}

function reviewOnlyFlash() {
  const reviewed = WORD_PARTS.filter(c => flashState.review.has(c._id));
  flashState.cards = reviewed.length ? reviewed : flashState.cards;
  flashState.cards.forEach((c, i) => c._id = `${c.type}-${c.part}-${i}`);
  flashState.idx = 0;
  flashState.known = new Set();
  flashState.review = new Set();
  renderFlash();
}

function showFlashComplete() {
  const total = flashState.cards.length;
  const known = flashState.known.size;
  const review = flashState.review.size;
  const pct = total > 0 ? Math.round((known / total) * 100) : 0;
  completedModes.add('flash');
  let emoji = '🎉', title = 'Deck Complete!';
  if (pct === 100) { emoji = '🌟'; title = 'Perfect Run!'; }
  else if (pct >= 80) { emoji = '✨'; title = 'Great Work!'; }
  else if (pct >= 50) { emoji = '📚'; title = 'Solid progress!'; }
  else { emoji = '💪'; title = 'Keep at it!'; }

  app.innerHTML = topbarHTML('Flashcards', `${total} / ${total}`) + `
    <div class="complete">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-title">${title}</div>
      <div class="complete-stats">You marked <strong>${known}</strong> known and <strong>${review}</strong> for review.</div>
      <div class="complete-actions">
        ${review > 0 ? `<button class="primary-btn" onclick="reviewOnlyFlash()">Drill ${review} review card${review === 1 ? '' : 's'}</button>` : ''}
        <button class="nav-btn" onclick="loadFlashDeck('${flashState.deck}')">Restart deck</button>
        <button class="nav-btn" onclick="go('home')">Back to modes</button>
      </div>
      ${submitBlockHTML('flash', known, total)}
    </div>
  `;
}

// =====================================================================
// TERM BREAKDOWN MODE
// =====================================================================

function startBreakdown() {
  breakState.items = shuffle(BREAKDOWN_TERMS);
  breakState.idx = 0;
  breakState.revealed = false;
  breakState.correct = 0;
  breakState.total = breakState.items.length;
  renderBreakdown();
}

function renderBreakdown() {
  if (breakState.idx >= breakState.items.length) { showBreakdownComplete(); return; }
  const item = breakState.items[breakState.idx];
  const pct = (breakState.idx / breakState.total) * 100;
  const hasPrefix = !!item.parts.prefix;
  const hasRoot = !!item.parts.root;
  const hasSuffix = !!item.parts.suffix;

  let fieldsHTML = '';
  if (hasPrefix) {
    fieldsHTML += `
      <div class="field">
        <div class="field-label">Prefix</div>
        <input class="field-input" id="prefixInput" placeholder="e.g. brady-" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <div class="field-reveal" id="prefixReveal"><strong>${escapeHtml(item.parts.prefix)}</strong> — ${escapeHtml(item.parts.prefixMeaning)}</div>
      </div>
    `;
  }
  if (hasRoot) {
    fieldsHTML += `
      <div class="field">
        <div class="field-label">Root</div>
        <input class="field-input" id="rootInput" placeholder="e.g. cardi/o" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <div class="field-reveal" id="rootReveal"><strong>${escapeHtml(item.parts.root)}</strong> — ${escapeHtml(item.parts.rootMeaning)}</div>
      </div>
    `;
  }
  if (hasSuffix) {
    fieldsHTML += `
      <div class="field">
        <div class="field-label">Suffix</div>
        <input class="field-input" id="suffixInput" placeholder="e.g. -itis" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <div class="field-reveal" id="suffixReveal"><strong>${escapeHtml(item.parts.suffix)}</strong> — ${escapeHtml(item.parts.suffixMeaning)}</div>
      </div>
    `;
  }

  app.innerHTML = topbarHTML('Term Breakdown',
    `<span class="pill score">✓ ${breakState.correct}</span> &nbsp; ${breakState.idx + 1} / ${breakState.total}`
  ) + `
    ${progressBarHTML(pct)}
    <div class="panel">
      <div class="panel-tag">Break it down</div>
      <div class="breakdown-term">${escapeHtml(item.term)}</div>
      <div class="breakdown-prompt">Type each part. We'll check your work when you reveal.</div>
      <div class="breakdown-fields">${fieldsHTML}</div>
      <div class="explanation" id="defReveal"><strong>Definition:</strong> ${escapeHtml(item.definition)}${item.note ? `<br><br><em style="opacity:0.85;">📌 ${escapeHtml(item.note)}</em>` : ''}</div>
      <div class="controls" style="grid-template-columns: 1fr;">
        <button class="primary-btn" id="checkBtn" onclick="checkBreakdown()">Check & Reveal</button>
      </div>
      <div class="utilities" style="margin-top: 12px;">
        <button class="util-btn" id="nextBreakBtn" onclick="nextBreakdown()" style="display:none;">Next term →</button>
      </div>
    </div>
  `;
}

function checkBreakdown() {
  if (breakState.revealed) return;
  const item = breakState.items[breakState.idx];
  let allCorrect = true;
  const norm = s => (s || '').trim().toLowerCase();

  if (item.parts.prefix) {
    const inp = document.getElementById('prefixInput');
    const correct = norm(inp.value) === norm(item.parts.prefix);
    inp.classList.add(correct ? 'correct' : 'wrong');
    inp.disabled = true;
    document.getElementById('prefixReveal').classList.add('show');
    if (!correct) allCorrect = false;
  }
  if (item.parts.root) {
    const inp = document.getElementById('rootInput');
    const correct = norm(inp.value) === norm(item.parts.root);
    inp.classList.add(correct ? 'correct' : 'wrong');
    inp.disabled = true;
    document.getElementById('rootReveal').classList.add('show');
    if (!correct) allCorrect = false;

  if (item.parts.suffix) {
    const inp = document.getElementById('suffixInput');
    const correct = norm(inp.value) === norm(item.parts.suffix);
    inp.classList.add(correct ? 'correct' : 'wrong');
    inp.disabled = true;
    document.getElementById('suffixReveal').classList.add('show');
    if (!correct) allCorrect = false;
  }

  if (allCorrect) breakState.correct++;
  document.getElementById('defReveal').classList.add('show');
  document.getElementById('checkBtn').style.display = 'none';

// =====================================================================
// BUILD THE TERM MODE

function startBuilder() {
  buildState.items = shuffle(BUILDER_TERMS);
  buildState.idx = 0;
  buildState.correct = 0;
  buildState.total = buildState.items.length;
  initBuilderRound();
}

function initBuilderRound() {
  if (buildState.idx >= buildState.items.length) { showBuilderComplete(); return; }
  const item = buildState.items[buildState.idx];
  buildState.placed = item.slots.map(() => null);
  renderBuilder();
}

function renderBuilder() {
  const item = buildState.items[buildState.idx];
  const pct = (buildState.idx / buildState.total) * 100;
  const allCorrect = item.slots.length > 0 && buildState.placed.every((p, j) => p === item.slots[j].value);
  const allFilled = buildState.placed.every(p => p !== null);

  const slotsHTML = item.slots.map((s, i) => {
    const placed = buildState.placed[i];
    const filled = placed !== null;
    return `
      <div class="slot ${filled ? 'filled' : ''} ${filled && allCorrect ? 'correct' : ''}" onclick="clearSlot(${i})">
        <div class="slot-label">${s.label}</div>
        <div class="slot-content">${placed ? escapeHtml(placed) : '—'}</div>
      </div>
    `;
  }).join('');

  const bankHTML = item.bank.map(chip => {
    const used = buildState.placed.includes(chip);
    return `<button class="chip ${used ? 'used' : ''}" ${used ? 'disabled' : ''} onclick="placeChip('${chip.replace(/'/g, "\\'")}')">${escapeHtml(chip)}</button>`;
  }).join('');

  app.innerHTML = topbarHTML('Build the Term',
    `<span class="pill score">✓ ${buildState.correct}</span> &nbsp; ${buildState.idx + 1} / ${buildState.total}`
  ) + `
    ${progressBarHTML(pct)}
    <div class="panel">
      <div class="panel-tag">Build the term</div>
      <div class="build-def">"${escapeHtml(item.meaning)}"</div>
      <div class="build-prompt">Click chips to fill the slots in order. Click a slot to clear it.</div>
      <div class="slots">${slotsHTML}</div>
      <div class="word-bank">${bankHTML}</div>
      ${allCorrect ? `
        <div class="explanation show"><strong>Correct!</strong> ${escapeHtml(item.term)} = ${item.slots.map(s => escapeHtml(s.value)).join(' + ')}</div>
        <div class="controls" style="grid-template-columns: 1fr;">
          <button class="primary-btn" onclick="nextBuilder()">Next Term →</button>
        </div>
      ` : allFilled ? `
        <div class="explanation show" style="border-left-color: var(--red); color: var(--red);"><strong>Not quite.</strong> Click a slot to clear it and try again.</div>
      ` : ''}
      <div class="utilities" style="margin-top: 12px;">
        <button class="util-btn" onclick="resetBuilderRound()">Reset this term</button>
        ${!allCorrect ? `<button class="util-btn" onclick="skipBuilder()">Skip / show answer</button>` : ''}
      </div>
    </div>
  `;
}

function placeChip(chip) {
  const item = buildState.items[buildState.idx];
  const slotIdx = buildState.placed.findIndex(p => p === null);
  if (slotIdx === -1) return;
  buildState.placed[slotIdx] = chip;
  const allCorrect = buildState.placed.every((p, j) => p === item.slots[j].value);
  if (allCorrect) buildState.correct++;
  renderBuilder();
}

function clearSlot(idx) {
  if (buildState.placed[idx] !== null) {
    buildState.placed[idx] = null;
    renderBuilder();
  }
}

function resetBuilderRound() {
  const item = buildState.items[buildState.idx];
  buildState.placed = item.slots.map(() => null);
  renderBuilder();
}

function skipBuilder() {
  const item = buildState.items[buildState.idx];
  buildState.placed = item.slots.map(s => s.value);
  renderBuilder();
}

function nextBuilder() {
  buildState.idx++;
  initBuilderRound();
}

function showBuilderComplete() {
  const pct = Math.round((buildState.correct / buildState.total) * 100);
  completedModes.add('build');
  let emoji = '🎉', title = 'All Built!';
  if (pct === 100) { emoji = '🌟'; title = 'Perfect Build!'; }

  else if (pct >= 50) { emoji = '🧩'; title = 'Solid Progress!'; }
  else { emoji = '💪'; title = 'Keep Building!'; }

  app.innerHTML = topbarHTML('Build the Term', `${buildState.total} / ${buildState.total}`) + `

      <div class="complete-title">${title}</div>
      <div class="complete-stats">You built <strong>${buildState.correct}</strong> of <strong>${buildState.total}</strong> correctly — <strong>${pct}%</strong>.</div>

function startChart() {
  chartState.items = [...CHARTS]; // ordered, not shuffled
  chartState.idx = 0;
  chartState.viewed = 0;
  chartState.total = chartState.items.length;
  renderChart();
}

function renderChart() {
  if (chartState.idx >= chartState.items.length) { showChartComplete(); return; }
  const chart = chartState.items[chartState.idx];
  const pct = (chartState.idx / chartState.total) * 100;

  const linesHTML = chart.chartLines.map(line => {
    if (line.type === 'header') {
      return `<div class="chart-header">${escapeHtml(line.text)}</div>`;
    }
    const segHTML = line.segments.map(seg => {
      if (seg.plain) return escapeHtml(seg.plain);
      const meaning = escapeHtml(seg.meaning);
      const term = escapeHtml(seg.jargon);
      return `<span class="chart-jargon" data-meaning="${meaning}" onclick="this.classList.toggle('revealed')">${term}</span>`;
    }).join('');
    return `<div class="chart-line">${segHTML}</div>`;
  }).join('');

  // Build glossary list
  const allTerms = [];
  chart.chartLines.forEach(line => {
    if (line.type === 'text') {
      line.segments.forEach(seg => {
        if (seg.jargon) allTerms.push({ term: seg.jargon, meaning: seg.meaning });
      });
    }
  });
  const glossaryHTML = allTerms.map(t =>
    `<div class="glossary-item"><span class="glossary-term">${escapeHtml(t.term)}</span><span class="glossary-meaning">${escapeHtml(t.meaning)}</span></div>`
  ).join('');

  app.innerHTML = topbarHTML('Chart Translation',
    `Chart ${chartState.idx + 1} / ${chartState.total}`
  ) + `
    ${progressBarHTML(pct)}
    <div class="panel">
      <div class="panel-tag">${escapeHtml(chart.title)}</div>
      <div class="chart-container">${linesHTML}</div>
      <p style="font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 16px; font-style: italic;">Tap each highlighted term to see its plain-language meaning.</p>

      <div class="chart-prompt">In your own words, write what this chart means as if you were explaining it to the patient or a family member:</div>
      <textarea class="chart-translation-box" id="chartBox" placeholder="Type your plain-language translation here..."></textarea>

      <div class="controls" style="grid-template-columns: 1fr 1fr; margin-top: 14px;">
        <button class="nav-btn" id="glossaryBtn" onclick="toggleGlossary()">Show glossary</button>
        <button class="primary-btn" onclick="revealSample()">Compare to sample answer</button>
      </div>

      <div class="glossary" id="glossary">
        <div class="glossary-title">Term Glossary</div>
        ${glossaryHTML}
      </div>

      <div class="explanation" id="sampleAnswer"><strong>Sample translation:</strong> ${escapeHtml(chart.sample)}</div>

      <div class="utilities" style="margin-top: 14px;">
        <button class="util-btn" onclick="nextChart()">${chartState.idx === chartState.items.length - 1 ? 'Finish' : 'Next chart →'}</button>
      </div>
    </div>
  `;
}

          <div class="case-demo-item"><strong>Vitals:</strong> ${escapeHtml(item.vitals)}</div>
        </div>
        <div class="case-section">
          <div class="case-section-label">Chief Complaint</div>
          <div class="case-section-text">${escapeHtml(item.chiefComplaint)}</div>
        </div>
        <div class="case-section">
          <div class="case-section-label">History &amp; Exam</div>
          <div class="case-section-text">${symptomsHTML}</div>
        </div>
      </div>
      <p style="font-size: 0.78rem; color: var(--ink-muted); margin-bottom: 16px; font-style: italic;">Tap any highlighted term for its plain-language meaning.</p>
      <div class="case-prompt">Based on the case above, what is the most likely diagnosis?</div>
      <div class="quiz-options" id="caseOptions">${optionsHTML}</div>
      <div class="explanation" id="caseExplain"><strong>Clinical reasoning:</strong> ${escapeHtml(item.explain)}</div>
      <div class="controls" style="grid-template-columns: 1fr;">
        <button class="primary-btn" id="nextCaseBtn" onclick="nextCase()" disabled>Next Case →</button>
      </div>
    </div>
  `;
  caseState.answered = false;
}

function answerCase(idx) {
  if (caseState.answered) return;
  caseState.answered = true;
  const item = caseState.items[caseState.idx];
  document.querySelectorAll('.quiz-option').forEach((el, i) => {
    el.disabled = true;
    if (i === item.correct) el.classList.add('correct');
    if (i === idx && i !== item.correct) el.classList.add('wrong');
  });
  if (idx === item.correct) caseState.correct++;
  document.getElementById('caseExplain').classList.add('show');
  document.getElementById('nextCaseBtn').disabled = false;
}

function nextCase() {
  caseState.idx++;
  renderCase();
}

function showCaseComplete() {
  const pct = Math.round((caseState.correct / caseState.total) * 100);
  completedModes.add('case');
  let emoji = '🎉', title = 'Cases Complete!';
  if (pct === 100) { emoji = '🌟'; title = 'Perfect Diagnostician!'; }
  else if (pct >= 90) { emoji = '🩺'; title = 'Sharp Clinical Eye!'; }
  else if (pct >= 75) { emoji = '✨'; title = 'Great Diagnosis!'; }
  else if (pct >= 50) { emoji = '👨‍⚕️'; title = 'Good Reasoning!'; }
  else { emoji = '💪'; title = 'Keep Studying!'; }

  app.innerHTML = topbarHTML('Diagnose the Patient', `${caseState.total} / ${caseState.total}`) + `
    <div class="complete">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-title">${title}</div>
      <div class="complete-stats">You correctly diagnosed <strong>${caseState.correct}</strong> of <strong>${caseState.total}</strong> patients — <strong>${pct}%</strong>.</div>
      <div class="complete-actions">
        <button class="primary-btn" onclick="startCase()">Try again (shuffled)</button>
        <button class="nav-btn" onclick="go('home')">Back to modes</button>
      </div>
      ${submitBlockHTML('case', caseState.correct, caseState.total)}
    </div>
  `;
}

// =====================================================================
// GLOBAL KEYBOARD
// =====================================================================

document.addEventListener('keydown', (e) => {
  // Special case: Enter on the first name input moves focus to last name; Enter on last name saves
  if (e.target.id === 'firstNameInput' && e.key === 'Enter') {
    e.preventDefault();
    const lastInp = document.getElementById('lastNameInput');
    if (lastInp) lastInp.focus();
    return;
  }
  if (e.target.id === 'lastNameInput' && e.key === 'Enter') {
    e.preventDefault();
    saveNameFromPrompt();
    return;
  }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (currentMode === 'flash') {
    const card = document.getElementById('flashCard');
    if (e.key === ' ') { e.preventDefault(); flipFlash(); }
    else if (e.key === 'ArrowLeft') navFlash(-1);
    else if (e.key === 'ArrowRight') navFlash(1);
    else if (e.key === '1' && card && card.classList.contains('flipped')) rateFlash('know');
    else if (e.key === '2' && card && card.classList.contains('flipped')) rateFlash('review');
  }
});

// INIT
go('home');
</script>
</body>
</html>
