<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digestive System Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6e8;
    --bg-alt: #f4ead0;
    --ink: #1f1a17;
    --ink-soft: #5a514b;
    --accent: #c4502b;
    --accent-soft: #e8a07c;
    --paper: #fffaf0;
    --paper-shadow: rgba(60, 40, 20, 0.18);
    --gold: #c89b3c;
    --green: #5a8a4d;
    --green-soft: #d6e6cb;
    --red: #b04545;
    --red-soft: #f0d4d0;
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(at 20% 10%, rgba(232, 160, 124, 0.15) 0%, transparent 50%),
      radial-gradient(at 90% 90%, rgba(200, 155, 60, 0.12) 0%, transparent 50%),
      var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* Subtle paper grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.06'/></svg>");
    pointer-events: none;
    opacity: 0.6;
    z-index: 1;
  }

  body {
    min-height: 100vh;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .wrapper {
    width: 100%;
    max-width: 720px;
    position: relative;
    z-index: 2;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 2.8rem);
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .deck-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .deck-btn {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    color: var(--ink);
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .deck-btn:hover {
    background: var(--bg-alt);
    transform: translateY(-1px);
  }

  .deck-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* Stats bar */
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--ink-soft);
    padding: 0 4px;
  }

  .progress {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--ink);
    font-size: 1rem;
  }

  .stat-pills {
    display: flex;
    gap: 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .pill.known {
    background: var(--green-soft);
    color: var(--green);
  }

  .pill.review {
    background: var(--red-soft);
    color: var(--red);
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--bg-alt);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    border-radius: 999px;
  }

  /* Card */
  .card-stage {
    perspective: 1600px;
    margin-bottom: 24px;
    min-height: 360px;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 360px;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    cursor: pointer;
  }

  .card.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--paper);
    border: 1px solid rgba(60, 40, 20, 0.1);
    border-radius: 14px;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow:
      0 1px 2px var(--paper-shadow),
      0 8px 24px var(--paper-shadow),
      0 24px 48px rgba(60, 40, 20, 0.08);
    text-align: center;
  }

  .card-face::before {
    content: '';
    position: absolute;
    top: 18px;
    left: 18px;
    right: 18px;
    bottom: 18px;
    border: 1px dashed rgba(60, 40, 20, 0.15);
    border-radius: 8px;
    pointer-events: none;
  }

  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #fffaf0 0%, #fdf2dc 100%);
  }

  .card-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 18px;
  }

  .card-term {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(1.6rem, 4.5vw, 2.4rem);
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 16px;
    letter-spacing: -0.01em;
  }

  .card-term em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .card-hint {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: auto;
    padding-top: 18px;
  }

  .card-definition {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 14px;
  }

  .card-extra {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink-soft);
    line-height: 1.5;
    font-style: italic;
    max-width: 480px;
  }

  .card-extra::before {
    content: '— ';
    color: var(--accent);
  }

  /* Bottom controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }

  .nav-btn {
    background: transparent;
    border: 1.5px solid var(--ink);
    color: var(--ink);
    padding: 12px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--ink);
    color: var(--paper);
    transform: translateY(-1px);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .flip-btn {
    background: var(--accent);
    color: var(--paper);
    border: none;
    padding: 12px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 999px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(196, 80, 43, 0.3);
  }

  .flip-btn:hover {
    background: #a8421f;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(196, 80, 43, 0.4);
  }

  /* Self-rating buttons (shown on the back) */
  .rating {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .rate-btn {
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 10px;
    border: 1.5px solid;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    background: var(--paper);
  }

  .rate-btn.know {
    border-color: var(--green);
    color: var(--green);
  }

  .rate-btn.know:hover {
    background: var(--green);
    color: white;
    transform: translateY(-1px);
  }

  .rate-btn.review {
    border-color: var(--red);
    color: var(--red);
  }

  .rate-btn.review:hover {
    background: var(--red);
    color: white;
    transform: translateY(-1px);
  }

  /* Utility actions */
  .utilities {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 0.8rem;
  }

  .util-btn {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    text-decoration: underline;
    text-decoration-color: rgba(60, 40, 20, 0.3);
    text-underline-offset: 4px;
    transition: color 0.2s;
    padding: 4px 8px;
  }

  .util-btn:hover {
    color: var(--accent);
    text-decoration-color: var(--accent);
  }

  /* Completion state */
  .complete {
    text-align: center;
    padding: 48px 32px;
    background: var(--paper);
    border-radius: 14px;
    box-shadow: 0 8px 24px var(--paper-shadow);
    border: 1px solid rgba(60, 40, 20, 0.1);
  }

  .complete-emoji {
    font-size: 3rem;
    margin-bottom: 16px;
  }

  .complete-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 2rem;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .complete-stats {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-soft);
    margin-bottom: 24px;
    font-size: 1rem;
  }

  .complete-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Keyboard hint */
  .kbd-hint {
    text-align: center;
    margin-top: 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }

  kbd {
    display: inline-block;
    background: var(--paper);
    border: 1px solid rgba(60, 40, 20, 0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    box-shadow: 0 1px 0 rgba(60, 40, 20, 0.15);
    margin: 0 2px;
  }

  @media (max-width: 540px) {
    .controls {
      grid-template-columns: 1fr;
    }
    .nav-btn {
      width: 100%;
    }
    .card-face {
      padding: 28px 22px;
    }
  }
</style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="eyebrow">Med Term Study Set</div>
      <h1>Digestive System <em>Flashcards</em></h1>
    </header>

    <div class="deck-picker" id="deckPicker"></div>

    <div class="stats" id="stats"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div id="cardArea"></div>

    <div class="kbd-hint">
      <kbd>Space</kbd> flip · <kbd>←</kbd> <kbd>→</kbd> navigate · <kbd>1</kbd> got it · <kbd>2</kbd> review
    </div>
  </div>

<script>
  // All cards, tagged by category for filtering
  const ALL_CARDS = [
    // Combining Forms
    { deck: 'forms', term: 'stomat/o', def: 'mouth', extra: 'Seen in stomatitis (inflammation of the mouth)' },
    { deck: 'forms', term: 'cheil/o', def: 'lips', extra: 'Seen in cheilitis (inflammation of the lips)' },
    { deck: 'forms', term: 'gingiv/o', def: 'gums', extra: 'Seen in gingivitis (inflammation of the gums)' },
    { deck: 'forms', term: 'enter/o', def: 'small intestine', extra: 'Seen in enteritis and gastroenteritis' },
    { deck: 'forms', term: 'cec/o', def: 'cecum (first part of the large intestine)', extra: 'The cecum is the pouch where the small and large intestines meet' },
    { deck: 'forms', term: 'col/o', def: 'colon (large intestine)', extra: 'Seen in colonoscopy and colectomy' },
    { deck: 'forms', term: 'proct/o', def: 'rectum and anus', extra: 'Seen in proctology (the study of rectal disorders)' },

    // Pathology
    { deck: 'path', term: "Crohn's disease", def: 'Chronic inflammation of the intestinal tract', extra: 'A type of inflammatory bowel disease (IBD) that can affect any part of the GI tract' },
    { deck: 'path', term: 'Diverticulitis', def: 'Inflammation of abnormal outpouchings (diverticula) in the intestinal wall of the colon', extra: 'Diverticulosis = the pouches exist; diverticulitis = the pouches are inflamed' },
    { deck: 'path', term: 'Pancreatitis', def: 'Inflammation of a gland behind the stomach; cysts may form', extra: 'The pancreas produces digestive enzymes and insulin' },
    { deck: 'path', term: 'Dysphagia', def: 'Difficulty swallowing', extra: '"Dys-" means difficult/painful; "-phagia" relates to eating or swallowing' },
    { deck: 'path', term: 'Cholelithiasis', def: 'Presence of gallstones within the gallbladder', extra: '"Chole-" = bile, "lith" = stone, "-iasis" = condition of' },
    { deck: 'path', term: 'Cirrhosis', def: 'Chronic degenerative disease of the liver', extra: 'Often caused by long-term alcohol use or chronic hepatitis' },
    { deck: 'path', term: 'Hemorrhoids', def: 'Swollen, twisted, varicose veins in the region of the rectum', extra: 'Can be internal (inside the rectum) or external (under the skin around the anus)' },
    { deck: 'path', term: 'Dental caries', def: 'Tooth decay caused by bacterial breakdown of enamel', extra: 'Untreated caries reaching the pulp typically require a root canal' },
    { deck: 'path', term: 'Oral leukoplakia', def: 'White patches in the mouth that may be precancerous', extra: '"Leuko-" = white; "-plakia" = patch. They will not scrape off, unlike thrush' },

    // Tooth & Mouth Anatomy
    { deck: 'anatomy', term: 'Enamel', def: 'The hard outer covering of the tooth', extra: 'The hardest substance in the human body' },
    { deck: 'anatomy', term: 'Dentin', def: 'The layer beneath the enamel that makes up most of the tooth', extra: 'Softer than enamel; transmits sensation to the pulp' },
    { deck: 'anatomy', term: 'Pulp', def: 'The part of the tooth that contains a rich supply of nerves and blood vessels', extra: 'When the pulp gets infected, a root canal is needed to remove it' },
    { deck: 'anatomy', term: 'Cementum', def: 'A thin layer of bone-like tissue that covers the root of the tooth', extra: 'Anchors the tooth to the jawbone via the periodontal ligament' },
    { deck: 'anatomy', term: 'Buccal', def: 'Pertaining to the cheek', extra: 'Buccal medications dissolve between the cheek and gum' },
    { deck: 'anatomy', term: 'Plaque', def: 'A sticky film of bacteria that forms on the teeth', extra: 'Hardens into tartar if not removed; leads to caries and gingivitis' },

    // Procedures
    { deck: 'proc', term: 'Laparoscopy', def: 'Procedure performed by visually examining the abdomen through small incisions', extra: 'Uses a thin lighted camera (laparoscope) instead of opening the abdomen fully' },
    { deck: 'proc', term: 'Colonoscopy', def: 'Visual examination of the large intestine', extra: 'A flexible scope with a camera is inserted through the rectum to view the colon' },
    { deck: 'proc', term: 'Cholecystectomy', def: 'Surgical removal of the gallbladder', extra: '"Chole-" = bile, "cyst" = sac, "-ectomy" = removal' },
    { deck: 'proc', term: 'Herniorrhaphy', def: 'Surgical repair of a hernia (with sutures)', extra: 'The suffix "-rrhaphy" specifically means surgical suture/repair' },
    { deck: 'proc', term: 'HIDA scan', def: 'Nuclear imaging scan that tracks bile flow to evaluate the gallbladder and bile ducts', extra: 'Stands for hepatobiliary iminodiacetic acid' },
    { deck: 'proc', term: 'Colonography', def: 'Imaging (usually CT) used to view the colon, sometimes called a "virtual colonoscopy"', extra: 'Less invasive than colonoscopy but cannot remove polyps' },
    { deck: 'proc', term: 'Root canal', def: 'Procedure that removes infected pulp from inside a tooth', extra: 'Often needed when dental caries reach the pulp chamber' },

    // Tests & Treatments
    { deck: 'tests', term: 'Stool culture', def: 'Test done to check for bacterial infections in the digestive tract', extra: 'A stool sample is grown in a lab to identify pathogens like Salmonella or C. diff' },
    { deck: 'tests', term: 'Lipase test', def: 'An enzyme blood test commonly used to evaluate pancreatic function', extra: 'Elevated lipase suggests pancreatitis' },
    { deck: 'tests', term: 'Fecal transplant', def: 'A treatment that introduces healthy gut bacteria from a donor', extra: 'Used most often for recurrent C. difficile infections' }
  ];

  const DECKS = [
    { id: 'all',     label: 'All Cards' },
    { id: 'forms',   label: 'Combining Forms' },
    { id: 'path',    label: 'Pathology' },
    { id: 'anatomy', label: 'Tooth & Mouth' },
    { id: 'proc',    label: 'Procedures' },
    { id: 'tests',   label: 'Tests & Treatments' }
  ];

  // State
  let activeDeck = 'all';
  let cards = [];
  let currentIdx = 0;
  let knownIds = new Set();
  let reviewIds = new Set();

  // Each card needs a stable id for tracking known/review
  ALL_CARDS.forEach((c, i) => c.id = i);

  const deckPicker = document.getElementById('deckPicker');
  const cardArea = document.getElementById('cardArea');
  const statsEl = document.getElementById('stats');
  const progressFill = document.getElementById('progressFill');

  function loadDeck(deckId) {
    activeDeck = deckId;
    cards = deckId === 'all'
      ? [...ALL_CARDS]
      : ALL_CARDS.filter(c => c.deck === deckId);
    currentIdx = 0;
    knownIds = new Set();
    reviewIds = new Set();
    renderDeckPicker();
    render();
  }

  function shuffleDeck() {
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    currentIdx = 0;
    render();
  }

  function reviewOnly() {
    if (reviewIds.size === 0) return;
    cards = ALL_CARDS.filter(c => reviewIds.has(c.id));
    currentIdx = 0;
    knownIds = new Set();
    reviewIds = new Set();
    render();
  }

  function resetProgress() {
    knownIds = new Set();
    reviewIds = new Set();
    currentIdx = 0;
    loadDeck(activeDeck);
  }

  function renderDeckPicker() {
    deckPicker.innerHTML = '';
    DECKS.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'deck-btn' + (d.id === activeDeck ? ' active' : '');
      btn.textContent = d.label;
      btn.addEventListener('click', () => loadDeck(d.id));
      deckPicker.appendChild(btn);
    });
  }

  function render() {
    if (cards.length === 0) {
      cardArea.innerHTML = `<div class="complete"><div class="complete-emoji">📭</div><div class="complete-title">No cards in this deck</div></div>`;
      statsEl.innerHTML = '';
      progressFill.style.width = '0%';
      return;
    }

    // Stats
    statsEl.innerHTML = `
      <span class="progress">Card ${currentIdx + 1} of ${cards.length}</span>
      <span class="stat-pills">
        <span class="pill known">✓ ${knownIds.size}</span>
        <span class="pill review">↻ ${reviewIds.size}</span>
      </span>
    `;
    progressFill.style.width = `${((currentIdx + 1) / cards.length) * 100}%`;

    const card = cards[currentIdx];

    cardArea.innerHTML = `
      <div class="card-stage">
        <div class="card" id="card">
          <div class="card-face card-front">
            <div class="card-tag">${getDeckLabel(card.deck)}</div>
            <div class="card-term">${card.term}</div>
            <div class="card-hint">tap card or press space to flip</div>
          </div>
          <div class="card-face card-back">
            <div class="card-tag">Definition</div>
            <div class="card-definition">${card.def}</div>
            ${card.extra ? `<div class="card-extra">${card.extra}</div>` : ''}
          </div>
        </div>
      </div>

      <div id="ratingArea"></div>

      <div class="controls">
        <button class="nav-btn" id="prevBtn" ${currentIdx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="flip-btn" id="flipBtn">Flip Card</button>
        <button class="nav-btn" id="nextBtn">Next →</button>
      </div>

      <div class="utilities">
        <button class="util-btn" onclick="shuffleDeck()">Shuffle</button>
        <button class="util-btn" onclick="resetProgress()">Reset progress</button>
        ${reviewIds.size > 0 ? `<button class="util-btn" onclick="reviewOnly()">Study only "needs review" (${reviewIds.size})</button>` : ''}
      </div>
    `;

    const cardEl = document.getElementById('card');
    cardEl.addEventListener('click', flip);
    document.getElementById('flipBtn').addEventListener('click', e => { e.stopPropagation(); flip(); });
    document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
    document.getElementById('nextBtn').addEventListener('click', () => navigate(1));
  }

  function getDeckLabel(deckId) {
    const found = DECKS.find(d => d.id === deckId);
    return found ? found.label : '';
  }

  function flip() {
    const cardEl = document.getElementById('card');
    if (!cardEl) return;
    cardEl.classList.toggle('flipped');
    if (cardEl.classList.contains('flipped')) {
      showRating();
    } else {
      hideRating();
    }
  }

  function showRating() {
    const card = cards[currentIdx];
    const ratingArea = document.getElementById('ratingArea');
    if (!ratingArea) return;
    ratingArea.innerHTML = `
      <div class="rating">
        <button class="rate-btn review" onclick="rate('review')">↻ Need to Review</button>
        <button class="rate-btn know" onclick="rate('know')">✓ Got It</button>
      </div>
    `;
  }

  function hideRating() {
    const ratingArea = document.getElementById('ratingArea');
    if (ratingArea) ratingArea.innerHTML = '';
  }

  function rate(verdict) {
    const card = cards[currentIdx];
    if (verdict === 'know') {
      knownIds.add(card.id);
      reviewIds.delete(card.id);
    } else {
      reviewIds.add(card.id);
      knownIds.delete(card.id);
    }
    // Auto-advance to next card
    if (currentIdx < cards.length - 1) {
      navigate(1);
    } else {
      showCompletion();
    }
  }

  function navigate(delta) {
    const newIdx = currentIdx + delta;
    if (newIdx < 0) return;
    if (newIdx >= cards.length) {
      showCompletion();
      return;
    }
    currentIdx = newIdx;
    render();
  }

  function showCompletion() {
    const total = cards.length;
    const known = cards.filter(c => knownIds.has(c.id)).length;
    const review = cards.filter(c => reviewIds.has(c.id)).length;
    const unrated = total - known - review;
    const pct = total > 0 ? Math.round((known / total) * 100) : 0;

    let emoji = '🎉';
    let title = 'Deck Complete!';
    if (pct === 100) { emoji = '🌟'; title = 'Perfect Run!'; }
    else if (pct >= 80) { emoji = '✨'; title = 'Great work!'; }
    else if (pct >= 50) { emoji = '📚'; title = 'Solid progress!'; }
    else { emoji = '💪'; title = 'Keep at it!'; }

    cardArea.innerHTML = `
      <div class="complete">
        <div class="complete-emoji">${emoji}</div>
        <div class="complete-title">${title}</div>
        <div class="complete-stats">
          You marked <strong>${known}</strong> as known, <strong>${review}</strong> for review${unrated > 0 ? `, and <strong>${unrated}</strong> unrated` : ''}.
        </div>
        <div class="complete-actions">
          ${review > 0 ? `<button class="flip-btn" onclick="reviewOnly()">Study ${review} review card${review === 1 ? '' : 's'}</button>` : ''}
          <button class="nav-btn" onclick="resetProgress()">Restart deck</button>
        </div>
      </div>
    `;
    statsEl.innerHTML = `<span class="progress">All ${total} cards seen</span><span class="stat-pills"><span class="pill known">✓ ${known}</span><span class="pill review">↻ ${review}</span></span>`;
    progressFill.style.width = '100%';
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const cardEl = document.getElementById('card');
    if (e.key === ' ') {
      e.preventDefault();
      if (cardEl) flip();
    } else if (e.key === 'ArrowLeft') {
      navigate(-1);
    } else if (e.key === 'ArrowRight') {
      navigate(1);
    } else if (e.key === '1' && cardEl && cardEl.classList.contains('flipped')) {
      rate('know');
    } else if (e.key === '2' && cardEl && cardEl.classList.contains('flipped')) {
      rate('review');
    }
  });

  // Init
  loadDeck('all');
</script>
</body>
</html>
